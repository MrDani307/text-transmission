<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Облачный Блокнот</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #1e1e1e;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
            width: 90%;
            max-width: 500px;
            text-align: center;
            position: relative;
        }
        #text-input {
            width: 100%;
            min-height: 150px;
            background-color: #2d2d2d;
            color: #ffffff;
            border: 1px solid #444;
            border-radius: 4px;
            padding: 10px;
            box-sizing: border-box;
            margin-bottom: 15px;
            outline: none;
            text-align: left;
            overflow-y: auto;
            white-space: pre-wrap;
            word-break: break-word;
            line-height: 1.5;
            caret-color: #4caf50;
            font-size: 14px;
            font-family: Arial, sans-serif;
        }
        #text-input:empty::before {
            content: "Введите текст здесь...";
            color: #666;
            pointer-events: none;
        }
        @keyframes fadeInChar {
            from { opacity: 0; }
            to   { opacity: 1; }
        }
        .char {
            display: inline;
            white-space: pre-wrap;
            animation: fadeInChar 0.3s ease forwards;
        }
        button {
            background-color: #4caf50;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
            margin-bottom: 10px;
        }
        button.login  { background-color: #4285f4; }
        button.copy   { background-color: #00bcd4; }
        button.logout-icon {
            background: none;
            border: none;
            color: #f44336;
            font-size: 20px;
            cursor: pointer;
            width: auto;
            padding: 5px;
            margin: 0;
            position: absolute;
            top: 15px;
            right: 15px;
            line-height: 1;
        }
        .hidden { display: none; }
        #user-info {
            margin-bottom: 15px;
            font-size: 14px;
            color: #aaa;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-right: 30px;
            min-height: 24px;
        }
    </style>
</head>
<body>

<div class="container">
    <div id="auth-screen">
        <h2>Авторизация</h2>
        <p>Войдите через Google для синхронизации текста</p>
        <button class="login" id="btn-login">Войти через Google</button>
    </div>

    <div id="app-screen" class="hidden">
        <button class="logout-icon" id="btn-logout" title="Выйти">&#10143;</button>
        <div id="user-info">
            <span>Вы вошли как: <span id="user-email"></span></span>
        </div>
        <div id="text-input" contenteditable="true" spellcheck="false"></div>
        <button class="copy" id="btn-copy">Копировать всё</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyC6JayNN_rZcn8o9scI5gBEVKO6xXhQLV4",
        authDomain: "text-transmission-7aa49.firebaseapp.com",
        databaseURL: "https://text-transmission-7aa49-default-rtdb.firebaseio.com",
        projectId: "text-transmission-7aa49",
        storageBucket: "text-transmission-7aa49.firebasestorage.app",
        messagingSenderId: "749005357603",
        appId: "1:749005357603:web:a3d567ce1b91350336a796"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db   = getDatabase(app);
    const provider = new GoogleAuthProvider();

    const authScreen    = document.getElementById('auth-screen');
    const appScreen     = document.getElementById('app-screen');
    const btnLogin      = document.getElementById('btn-login');
    const btnLogout     = document.getElementById('btn-logout');
    const btnCopy       = document.getElementById('btn-copy');
    const textInput     = document.getElementById('text-input');
    const userEmailHtml = document.getElementById('user-email');

    let currentUser   = null;
    let isTyping      = false;
    let typingTimeout = null;
    let lastText      = '';      // последнее известное состояние текста
    let isRemoteUpdate = false;  // флаг: обновление пришло из Firebase

    // ── Утилиты ──────────────────────────────────────────────────────────────

    // Чистый текст из contenteditable
    function getPlainText() {
        // innerText корректно читает \n из <br> и блочных элементов
        return textInput.innerText.replace(/\u00a0/g, ' ').replace(/\n$/, '');
    }

    // Загрузить текст без анимации (приход из Firebase или начальная загрузка)
    function loadTextSilently(text) {
        isRemoteUpdate = true;
        textInput.innerHTML = '';
        if (text) {
            const span = document.createElement('span');
            span.style.whiteSpace = 'pre-wrap';
            span.textContent = text;
            textInput.appendChild(span);
        }
        lastText = text;
        isRemoteUpdate = false;
    }

    // Найти позицию курсора в чистом тексте
    function getCaretPosition() {
        const sel = window.getSelection();
        if (!sel || !sel.rangeCount) return lastText.length;
        const range = sel.getRangeAt(0);
        const preRange = range.cloneRange();
        preRange.selectNodeContents(textInput);
        preRange.setEnd(range.endContainer, range.endOffset);
        return preRange.toString().length;
    }

    // Вставить символы с анимацией начиная с позиции pos в lastText
    // newText — полный новый текст, pos — с какой позиции начались изменения
    function applyAnimatedDiff(newText) {
        // Находим общий префикс
        let start = 0;
        while (start < lastText.length && start < newText.length && lastText[start] === newText[start]) {
            start++;
        }
        // Находим общий суффикс
        let oldEnd = lastText.length;
        let newEnd = newText.length;
        while (oldEnd > start && newEnd > start && lastText[oldEnd - 1] === newText[newEnd - 1]) {
            oldEnd--;
            newEnd--;
        }

        const inserted = newText.slice(start, newEnd);   // новые символы
        const deletedCount = oldEnd - start;             // сколько удалено

        if (deletedCount === 0 && inserted.length === 0) return; // ничего не изменилось

        // Пересобираем DOM
        // Текущий DOM-текст разбиваем на: prefix | deleted | suffix
        const currentFull = lastText;
        const prefix  = currentFull.slice(0, start);
        const suffix  = currentFull.slice(oldEnd);

        textInput.innerHTML = '';

        // Префикс — без анимации
        if (prefix) {
            const s = document.createElement('span');
            s.style.whiteSpace = 'pre-wrap';
            s.textContent = prefix;
            textInput.appendChild(s);
        }

        // Вставленные символы — каждый со своей анимацией
        for (const ch of inserted) {
            const s = document.createElement('span');
            s.className = 'char';
            s.textContent = ch;
            textInput.appendChild(s);
        }

        // Суффикс — без анимации
        if (suffix) {
            const s = document.createElement('span');
            s.style.whiteSpace = 'pre-wrap';
            s.textContent = suffix;
            textInput.appendChild(s);
        }

        // Восстанавливаем курсор после вставки
        const caretPos = start + inserted.length;
        restoreCaret(caretPos);

        lastText = newText;
    }

    // Поставить курсор на нужную позицию в тексте
    function restoreCaret(pos) {
        const sel = window.getSelection();
        const range = document.createRange();
        let chars = 0;
        let found = false;

        function walk(node) {
            if (found) return;
            if (node.nodeType === Node.TEXT_NODE) {
                const len = node.textContent.length;
                if (chars + len >= pos) {
                    range.setStart(node, pos - chars);
                    range.collapse(true);
                    found = true;
                } else {
                    chars += len;
                }
            } else {
                for (const child of node.childNodes) walk(child);
            }
        }

        walk(textInput);
        if (!found) {
            range.selectNodeContents(textInput);
            range.collapse(false);
        }
        sel.removeAllRanges();
        sel.addRange(range);
    }

    function saveText(text) {
        if (!currentUser) return;
        isTyping = true;
        set(ref(db, 'users/' + currentUser.uid + '/text'), text)
            .catch(e => console.error("Ошибка сохранения:", e));
        clearTimeout(typingTimeout);
        typingTimeout = setTimeout(() => { isTyping = false; }, 1000);
    }

    // ── Auth ─────────────────────────────────────────────────────────────────

    onAuthStateChanged(auth, (user) => {
        if (user) {
            currentUser = user;
            userEmailHtml.textContent = user.email;
            authScreen.classList.add('hidden');
            appScreen.classList.remove('hidden');

            const textRef = ref(db, 'users/' + user.uid + '/text');
            onValue(textRef, (snapshot) => {
                const data = snapshot.val() ?? '';
                if (!isTyping) {
                    loadTextSilently(data);
                }
            });
        } else {
            currentUser = null;
            authScreen.classList.remove('hidden');
            appScreen.classList.add('hidden');
            textInput.innerHTML = '';
            lastText = '';
        }
    });

    // ── Ввод ─────────────────────────────────────────────────────────────────

    // Событие input — работает на всех устройствах включая мобильные
    textInput.addEventListener('input', (e) => {
        if (isRemoteUpdate) return;

        const newText = getPlainText();
        if (newText === lastText) return;

        applyAnimatedDiff(newText);
        saveText(newText);
    });

    // Вставка через буфер обмена
    textInput.addEventListener('paste', (e) => {
        e.preventDefault();
        const text = e.clipboardData.getData('text/plain');
        if (!text || !currentUser) return;

        const caretPos = getCaretPosition();
        const newText = lastText.slice(0, caretPos) + text + lastText.slice(caretPos);
        applyAnimatedDiff(newText);
        saveText(newText);
    });

    // ── Кнопки ───────────────────────────────────────────────────────────────

    btnCopy.addEventListener('click', () => {
        const text = getPlainText();
        navigator.clipboard.writeText(text)
            .then(() => {
                const orig = btnCopy.textContent;
                btnCopy.textContent = "Скопировано!";
                btnCopy.style.backgroundColor = "#4caf50";
                setTimeout(() => {
                    btnCopy.textContent = orig;
                    btnCopy.style.backgroundColor = "#00bcd4";
                }, 1500);
            })
            .catch(e => console.error("Ошибка копирования:", e));
    });

    btnLogin.addEventListener('click', () => {
        signInWithPopup(auth, provider)
            .catch(e => console.error("Ошибка авторизации:", e));
    });

    btnLogout.addEventListener('click', () => {
        signOut(auth)
            .catch(e => console.error("Ошибка выхода:", e));
    });
</script>

</body>
</html>
