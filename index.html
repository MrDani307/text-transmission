<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Облачный Блокнот</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            position: relative;
            overflow: hidden;
        }

        body::before, body::after {
            content: '';
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.35;
            pointer-events: none;
            z-index: 0;
        }
        body::before {
            width: 500px; height: 500px;
            background: radial-gradient(circle, #7b2ff7, #4a00e0);
            top: -150px; left: -150px;
            animation: float1 8s ease-in-out infinite;
        }
        body::after {
            width: 400px; height: 400px;
            background: radial-gradient(circle, #00c3ff, #0066ff);
            bottom: -100px; right: -100px;
            animation: float2 10s ease-in-out infinite;
        }

        @keyframes float1 {
            0%, 100% { transform: translate(0, 0); }
            50%       { transform: translate(40px, 40px); }
        }
        @keyframes float2 {
            0%, 100% { transform: translate(0, 0); }
            50%       { transform: translate(-30px, -30px); }
        }

        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 520px;
            background: rgba(255,255,255,0.07);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 24px;
            padding: 32px 28px 24px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.15);
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .logo-icon {
            width: 36px; height: 36px;
            background: linear-gradient(135deg, #a855f7, #6366f1);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px;
            box-shadow: 0 0 16px rgba(168,85,247,0.5);
        }
        .logo-text {
            font-size: 16px;
            font-weight: 600;
            color: rgba(255,255,255,0.9);
            letter-spacing: 0.3px;
        }
        #user-info {
            font-size: 12px;
            color: rgba(255,255,255,0.45);
            max-width: 180px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        #btn-logout {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.12);
            color: rgba(255,100,100,0.8);
            font-size: 18px;
            cursor: pointer;
            width: 34px; height: 34px;
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.2s;
            flex-shrink: 0;
            margin-left: 10px;
        }
        #btn-logout:hover {
            background: rgba(255,80,80,0.2);
            border-color: rgba(255,80,80,0.4);
            color: #ff6464;
        }

        .divider {
            height: 1px;
            background: rgba(255,255,255,0.07);
            margin: 20px 0 18px;
        }

        /* ── Пикер анимации ── */
        #anim-picker {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            margin-bottom: 14px;
        }
        .anim-btn {
            background: rgba(255,255,255,0.06);
            color: rgba(255,255,255,0.45);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 5px 13px;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
            width: auto;
            margin: 0;
            letter-spacing: 0.2px;
        }
        .anim-btn:hover {
            background: rgba(168,85,247,0.2);
            border-color: rgba(168,85,247,0.5);
            color: #fff;
        }
        .anim-btn.active {
            background: linear-gradient(135deg, rgba(168,85,247,0.5), rgba(99,102,241,0.5));
            border-color: rgba(168,85,247,0.7);
            color: #fff;
            box-shadow: 0 0 12px rgba(168,85,247,0.3);
        }

        /* ── Обёртка поля ввода ── */
        .input-wrapper {
            position: relative;
            margin-bottom: 10px;
        }

        /* Настоящий textarea — невидимый, поверх display-слоя */
        #real-input {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            opacity: 0;
            resize: none;
            border: none;
            outline: none;
            background: transparent;
            color: transparent;
            caret-color: transparent;
            font-size: 14px;
            font-family: 'Segoe UI', Arial, sans-serif;
            line-height: 1.65;
            padding: 14px 16px;
            z-index: 2;
            cursor: text;
        }

        /* Визуальный слой */
        #display-layer {
            width: 100%;
            height: 160px;
            min-height: 60px;
            max-height: 500px;
            resize: vertical;
            overflow-y: auto;
            overflow-x: hidden;
            background: rgba(0,0,0,0.25);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 14px;
            padding: 14px 16px;
            font-size: 14px;
            font-family: 'Segoe UI', Arial, sans-serif;
            line-height: 1.65;
            color: rgba(255,255,255,0.92);
            white-space: pre-wrap;
            word-break: break-word;
            text-align: left;
            transition: border-color 0.2s, box-shadow 0.2s;
            cursor: text;
            position: relative;
            z-index: 1;
        }
        #display-layer.focused {
            border-color: rgba(168,85,247,0.5);
            box-shadow: 0 0 0 3px rgba(168,85,247,0.12), inset 0 0 20px rgba(168,85,247,0.04);
        }
        #display-layer:empty::before {
            content: "Введите текст здесь...";
            color: rgba(255,255,255,0.2);
            pointer-events: none;
        }

        /* Мигающий курсор в display-layer */
        #caret {
            display: inline-block;
            width: 2px;
            height: 1em;
            background: #a855f7;
            vertical-align: text-bottom;
            margin-left: 1px;
            animation: blink 1s step-end infinite;
            box-shadow: 0 0 6px #a855f7;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50%       { opacity: 0; }
        }
        #caret.hidden { display: none; }

        /* ── Анимации символов ── */
        @keyframes anim-fade {
            from { opacity: 0; }
            to   { opacity: 1; }
        }
        @keyframes anim-slide-up {
            from { opacity: 0; transform: translateY(6px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes anim-scale {
            from { opacity: 0; transform: scale(0.2); }
            to   { opacity: 1; transform: scale(1); }
        }
        @keyframes anim-glow {
            0%   { opacity: 0; color: #c084fc; text-shadow: 0 0 10px #a855f7, 0 0 25px #a855f7; }
            50%  { opacity: 1; color: #e0aaff; text-shadow: 0 0 6px #a855f7; }
            100% { opacity: 1; color: rgba(255,255,255,0.92); text-shadow: none; }
        }
        @keyframes anim-bounce {
            0%   { opacity: 0; transform: translateY(-10px); }
            55%  { opacity: 1; transform: translateY(3px); }
            75%  { transform: translateY(-2px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        @keyframes anim-typewriter {
            0%,49% { opacity: 1; color: #c084fc; text-shadow: 0 0 6px #a855f7; }
            50%,99%{ opacity: 0; }
            100%   { opacity: 1; color: rgba(255,255,255,0.92); text-shadow: none; }
        }

        .char {
            display: inline-block;
            white-space: pre;
            vertical-align: baseline;
        }
        .anim-fade       { animation: anim-fade       0.25s ease forwards; }
        .anim-slide-up   { animation: anim-slide-up   0.28s ease forwards; }
        .anim-scale      { animation: anim-scale       0.22s cubic-bezier(.34,1.56,.64,1) forwards; }
        .anim-glow       { animation: anim-glow        0.5s  ease forwards; }
        .anim-bounce     { animation: anim-bounce      0.35s ease forwards; }
        .anim-typewriter { animation: anim-typewriter  0.45s steps(1) forwards; }

        /* ── Статус ── */
        #sync-status {
            font-size: 11px;
            color: rgba(255,255,255,0.25);
            text-align: right;
            margin-bottom: 10px;
            height: 14px;
            transition: color 0.3s;
        }
        #sync-status.saving { color: rgba(168,85,247,0.7); }
        #sync-status.saved  { color: rgba(99,241,166,0.6); }

        /* ── Кнопки ── */
        .btn-row {
            display: flex;
            gap: 10px;
        }
        .btn-action {
            flex: 1;
            padding: 11px 16px;
            border: none;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            width: auto;
            margin: 0;
        }
        #btn-copy {
            background: rgba(255,255,255,0.08);
            color: rgba(255,255,255,0.8);
            border: 1px solid rgba(255,255,255,0.12);
        }
        #btn-copy:hover { background: rgba(255,255,255,0.14); color: #fff; }
        #btn-copy.copied {
            background: linear-gradient(135deg, rgba(99,241,166,0.3), rgba(34,197,94,0.3));
            border-color: rgba(99,241,166,0.4);
            color: #6effa8;
        }

        /* ── Авторизация ── */
        #auth-screen { text-align: center; padding: 10px 0; }
        #auth-screen h2 {
            font-size: 22px; font-weight: 700;
            color: #fff; margin-bottom: 8px;
        }
        #auth-screen p {
            font-size: 14px; color: rgba(255,255,255,0.45);
            margin-bottom: 28px; line-height: 1.5;
        }
        #btn-login {
            width: 100%; padding: 13px; border: none;
            border-radius: 14px; font-size: 15px; font-weight: 600;
            cursor: pointer;
            background: linear-gradient(135deg, #a855f7, #6366f1);
            color: #fff;
            box-shadow: 0 4px 20px rgba(168,85,247,0.4);
            transition: all 0.2s;
            display: flex; align-items: center; justify-content: center;
            gap: 10px; margin: 0;
        }
        #btn-login:hover { transform: translateY(-1px); box-shadow: 0 6px 28px rgba(168,85,247,0.55); }
        #btn-login:active { transform: translateY(0); }
        .google-icon {
            width: 20px; height: 20px; background: #fff;
            border-radius: 50%; display: flex;
            align-items: center; justify-content: center;
            font-size: 13px; font-weight: 700; color: #4285f4;
            flex-shrink: 0;
        }

        .hidden { display: none; }
    </style>
</head>
<body>
<div class="container">

    <div id="auth-screen">
        <div style="font-size:48px;margin-bottom:16px;">📝</div>
        <h2>Облачный Блокнот</h2>
        <p>Войдите через Google чтобы синхронизировать текст между устройствами</p>
        <button id="btn-login">
            <span class="google-icon">G</span>
            Войти через Google
        </button>
    </div>

    <div id="app-screen" class="hidden">
        <div class="header">
            <div class="logo">
                <div class="logo-icon">📝</div>
                <span class="logo-text">Облачный Блокнот</span>
            </div>
            <div style="display:flex;align-items:center;gap:6px;min-width:0;">
                <span id="user-info"></span>
                <button id="btn-logout" title="Выйти">⇥</button>
            </div>
        </div>

        <div class="divider"></div>

        <div id="anim-picker">
            <button class="anim-btn active" data-anim="none">Без эффекта</button>
            <button class="anim-btn" data-anim="anim-fade">Fade</button>
            <button class="anim-btn" data-anim="anim-slide-up">Slide Up</button>
            <button class="anim-btn" data-anim="anim-scale">Scale</button>
            <button class="anim-btn" data-anim="anim-glow">Glow</button>
            <button class="anim-btn" data-anim="anim-bounce">Bounce</button>
            <button class="anim-btn" data-anim="anim-typewriter">Typewriter</button>
        </div>

        <div class="input-wrapper">
            <!-- Невидимый реальный textarea для ввода -->
            <textarea id="real-input" autocomplete="off" autocorrect="off"
                      autocapitalize="off" spellcheck="false"></textarea>
            <!-- Визуальный слой -->
            <div id="display-layer"></div>
        </div>

        <div id="sync-status">—</div>

        <div class="btn-row">
            <button class="btn-action" id="btn-copy">Копировать всё</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged }
        from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getDatabase, ref, set, onValue }
        from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyC6JayNN_rZcn8o9scI5gBEVKO6xXhQLV4",
        authDomain: "text-transmission-7aa49.firebaseapp.com",
        databaseURL: "https://text-transmission-7aa49-default-rtdb.firebaseio.com",
        projectId: "text-transmission-7aa49",
        storageBucket: "text-transmission-7aa49.firebasestorage.app",
        messagingSenderId: "749005357603",
        appId: "1:749005357603:web:a3d567ce1b91350336a796"
    };

    const app      = initializeApp(firebaseConfig);
    const auth     = getAuth(app);
    const db       = getDatabase(app);
    const provider = new GoogleAuthProvider();

    const authScreen   = document.getElementById('auth-screen');
    const appScreen    = document.getElementById('app-screen');
    const btnLogin     = document.getElementById('btn-login');
    const btnLogout    = document.getElementById('btn-logout');
    const btnCopy      = document.getElementById('btn-copy');
    const realInput    = document.getElementById('real-input');
    const displayLayer = document.getElementById('display-layer');
    const userInfo     = document.getElementById('user-info');
    const animPicker   = document.getElementById('anim-picker');
    const syncStatus   = document.getElementById('sync-status');

    let currentUser    = null;
    let isTyping       = false;
    let typingTimeout  = null;
    let isRemoteUpdate = false;
    let currentAnim    = 'none';
    let lastValue      = '';   // последнее значение textarea
    let syncTimeout    = null;

    // ── Выбор анимации ────────────────────────────────────────────────────────
    animPicker.addEventListener('click', (e) => {
        const btn = e.target.closest('.anim-btn');
        if (!btn) return;
        document.querySelectorAll('.anim-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentAnim = btn.dataset.anim;
    });

    // ── Статус ────────────────────────────────────────────────────────────────
    function setStatus(text, cls) {
        syncStatus.textContent = text;
        syncStatus.className = cls || '';
        clearTimeout(syncTimeout);
        if (cls === 'saved') {
            syncTimeout = setTimeout(() => {
                syncStatus.textContent = '—';
                syncStatus.className = '';
            }, 2000);
        }
    }

    // ── Отрисовка display-layer ───────────────────────────────────────────────
    // Перестраивает визуальный слой по новому тексту.
    // newChars — строка символов которые нужно анимировать (только при ручном вводе).
    // При animate=false просто рисуем весь текст без анимации.
    function renderDisplay(newText, animateFrom, animateTo) {
        // animateFrom..animateTo — диапазон новых символов (индексы в newText)
        displayLayer.innerHTML = '';

        if (!newText) return;

        // Часть до анимируемого диапазона
        if (animateFrom > 0) {
            const s = document.createElement('span');
            s.textContent = newText.slice(0, animateFrom);
            displayLayer.appendChild(s);
        }

        // Анимируемые символы
        if (animateFrom < animateTo && currentAnim !== 'none') {
            const inserted = newText.slice(animateFrom, animateTo);
            for (const ch of inserted) {
                const s = document.createElement('span');
                s.className = `char ${currentAnim}`;
                s.textContent = ch;
                displayLayer.appendChild(s);
            }
        } else if (animateFrom < animateTo) {
            // none — без анимации
            const s = document.createElement('span');
            s.textContent = newText.slice(animateFrom, animateTo);
            displayLayer.appendChild(s);
        }

        // Часть после анимируемого диапазона
        if (animateTo < newText.length) {
            const s = document.createElement('span');
            s.textContent = newText.slice(animateTo);
            displayLayer.appendChild(s);
        }
    }

    // Загрузить текст из Firebase без анимации
    function loadTextSilently(text) {
        isRemoteUpdate = true;
        realInput.value = text;
        lastValue = text;
        renderDisplay(text, 0, 0); // 0,0 = без анимации (пустой диапазон)

        // Перерисовываем весь текст одним span
        displayLayer.innerHTML = '';
        if (text) {
            const s = document.createElement('span');
            s.textContent = text;
            displayLayer.appendChild(s);
        }
        isRemoteUpdate = false;
    }

    // ── Сохранение ────────────────────────────────────────────────────────────
    function saveText(text) {
        if (!currentUser) return;
        isTyping = true;
        setStatus('Сохранение...', 'saving');
        set(ref(db, 'users/' + currentUser.uid + '/text'), text)
            .then(() => setStatus('Сохранено ✓', 'saved'))
            .catch(e => { console.error(e); setStatus('Ошибка', ''); });
        clearTimeout(typingTimeout);
        typingTimeout = setTimeout(() => { isTyping = false; }, 1000);
    }

    // ── Обработка ввода ───────────────────────────────────────────────────────
    realInput.addEventListener('input', () => {
        if (isRemoteUpdate) return;

        const newValue = realInput.value;
        const oldValue = lastValue;

        if (newValue === oldValue) return;

        // Найти общий префикс и суффикс
        let start = 0;
        while (start < oldValue.length && start < newValue.length && oldValue[start] === newValue[start]) {
            start++;
        }
        let oldEnd = oldValue.length;
        let newEnd = newValue.length;
        while (oldEnd > start && newEnd > start && oldValue[oldEnd-1] === newValue[newEnd-1]) {
            oldEnd--;
            newEnd--;
        }

        const inserted     = newValue.slice(start, newEnd);
        const deletedCount = oldEnd - start;
        const isLargeChange = inserted.length > 20 || deletedCount > 20;

        lastValue = newValue;

        if (isLargeChange || currentAnim === 'none') {
            // Большая вставка или режим без анимации — рисуем без анимации
            displayLayer.innerHTML = '';
            if (newValue) {
                const s = document.createElement('span');
                s.textContent = newValue;
                displayLayer.appendChild(s);
            }
        } else {
            // Маленькое изменение — анимируем только вставленное
            renderDisplay(newValue, start, start + inserted.length);
        }

        saveText(newValue);
    });

    // Фокус на textarea при клике на display-layer
    displayLayer.addEventListener('click', () => realInput.focus());
    displayLayer.addEventListener('focus', () => realInput.focus());

    // Визуальный фокус
    realInput.addEventListener('focus', () => displayLayer.classList.add('focused'));
    realInput.addEventListener('blur',  () => displayLayer.classList.remove('focused'));

    // Синхронизировать прокрутку textarea с display-layer
    realInput.addEventListener('scroll', () => {
        displayLayer.scrollTop = realInput.scrollTop;
    });

    // ── Auth ──────────────────────────────────────────────────────────────────
    onAuthStateChanged(auth, (user) => {
        if (user) {
            currentUser = user;
            userInfo.textContent = user.email;
            authScreen.classList.add('hidden');
            appScreen.classList.remove('hidden');

            const textRef = ref(db, 'users/' + user.uid + '/text');
            onValue(textRef, (snapshot) => {
                const data = snapshot.val() ?? '';
                if (!isTyping) loadTextSilently(data);
            });
        } else {
            currentUser = null;
            authScreen.classList.remove('hidden');
            appScreen.classList.add('hidden');
            realInput.value = '';
            displayLayer.innerHTML = '';
            lastValue = '';
        }
    });

    // ── Кнопки ────────────────────────────────────────────────────────────────
    btnCopy.addEventListener('click', () => {
        navigator.clipboard.writeText(realInput.value).then(() => {
            btnCopy.textContent = '✓ Скопировано';
            btnCopy.classList.add('copied');
            setTimeout(() => {
                btnCopy.textContent = 'Копировать всё';
                btnCopy.classList.remove('copied');
            }, 1500);
        }).catch(e => console.error(e));
    });

    btnLogin.addEventListener('click', () => {
        signInWithPopup(auth, provider).catch(e => console.error(e));
    });
    btnLogout.addEventListener('click', () => {
        signOut(auth).catch(e => console.error(e));
    });
</script>
</body>
</html>
