<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Облачный Блокнот</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            position: relative;
            overflow: hidden;
        }

        /* Декоративные пузыри на фоне */
        body::before, body::after {
            content: '';
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.35;
            pointer-events: none;
            z-index: 0;
        }
        body::before {
            width: 500px; height: 500px;
            background: radial-gradient(circle, #7b2ff7, #4a00e0);
            top: -150px; left: -150px;
            animation: float1 8s ease-in-out infinite;
        }
        body::after {
            width: 400px; height: 400px;
            background: radial-gradient(circle, #00c3ff, #0066ff);
            bottom: -100px; right: -100px;
            animation: float2 10s ease-in-out infinite;
        }

        @keyframes float1 {
            0%, 100% { transform: translate(0, 0); }
            50%       { transform: translate(40px, 40px); }
        }
        @keyframes float2 {
            0%, 100% { transform: translate(0, 0); }
            50%       { transform: translate(-30px, -30px); }
        }

        /* ── Контейнер (стекло) ── */
        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 520px;
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 24px;
            padding: 32px 28px 24px;
            box-shadow:
                0 8px 32px rgba(0, 0, 0, 0.4),
                inset 0 1px 0 rgba(255,255,255,0.15);
        }

        /* ── Шапка ── */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .logo-icon {
            width: 36px; height: 36px;
            background: linear-gradient(135deg, #a855f7, #6366f1);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px;
            box-shadow: 0 0 16px rgba(168, 85, 247, 0.5);
        }
        .logo-text {
            font-size: 16px;
            font-weight: 600;
            color: rgba(255,255,255,0.9);
            letter-spacing: 0.3px;
        }
        #user-info {
            font-size: 12px;
            color: rgba(255,255,255,0.45);
            max-width: 180px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* ── Кнопка выхода ── */
        #btn-logout {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.12);
            color: rgba(255, 100, 100, 0.8);
            font-size: 18px;
            cursor: pointer;
            width: 34px; height: 34px;
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.2s;
            flex-shrink: 0;
            margin-left: 10px;
        }
        #btn-logout:hover {
            background: rgba(255, 80, 80, 0.2);
            border-color: rgba(255, 80, 80, 0.4);
            color: #ff6464;
        }

        /* ── Пикер анимации ── */
        #anim-picker {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            margin-bottom: 14px;
        }
        .anim-btn {
            background: rgba(255,255,255,0.06);
            color: rgba(255,255,255,0.45);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 5px 13px;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
            width: auto;
            margin: 0;
            letter-spacing: 0.2px;
        }
        .anim-btn:hover {
            background: rgba(168, 85, 247, 0.2);
            border-color: rgba(168, 85, 247, 0.5);
            color: #fff;
        }
        .anim-btn.active {
            background: linear-gradient(135deg, rgba(168,85,247,0.5), rgba(99,102,241,0.5));
            border-color: rgba(168, 85, 247, 0.7);
            color: #fff;
            box-shadow: 0 0 12px rgba(168, 85, 247, 0.3);
        }

        /* ── Поле ввода ── */
        #text-input {
            width: 100%;
            height: 160px;
            min-height: 60px;
            max-height: 500px;
            resize: vertical;
            background: rgba(0, 0, 0, 0.25);
            color: rgba(255,255,255,0.92);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 14px;
            padding: 14px 16px;
            margin-bottom: 14px;
            outline: none;
            text-align: left;
            overflow-y: auto;
            overflow-x: hidden;
            white-space: pre-wrap;
            word-break: break-word;
            line-height: 1.65;
            caret-color: #a855f7;
            font-size: 14px;
            font-family: 'Segoe UI', Arial, sans-serif;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        #text-input:focus {
            border-color: rgba(168, 85, 247, 0.5);
            box-shadow: 0 0 0 3px rgba(168, 85, 247, 0.12), inset 0 0 20px rgba(168,85,247,0.04);
        }
        #text-input:empty::before {
            content: "Введите текст здесь...";
            color: rgba(255,255,255,0.2);
            pointer-events: none;
        }

        /* ── Кнопки действий ── */
        .btn-row {
            display: flex;
            gap: 10px;
        }
        .btn-action {
            flex: 1;
            padding: 11px 16px;
            border: none;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            letter-spacing: 0.2px;
            width: auto;
            margin: 0;
        }
        #btn-copy {
            background: rgba(255,255,255,0.08);
            color: rgba(255,255,255,0.8);
            border: 1px solid rgba(255,255,255,0.12);
        }
        #btn-copy:hover {
            background: rgba(255,255,255,0.14);
            color: #fff;
        }
        #btn-copy.copied {
            background: linear-gradient(135deg, rgba(99,241,166,0.3), rgba(34,197,94,0.3));
            border-color: rgba(99,241,166,0.4);
            color: #6effa8;
        }

        /* ── Экран авторизации ── */
        #auth-screen {
            text-align: center;
            padding: 10px 0;
        }
        #auth-screen h2 {
            font-size: 22px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 8px;
            letter-spacing: 0.3px;
        }
        #auth-screen p {
            font-size: 14px;
            color: rgba(255,255,255,0.45);
            margin-bottom: 28px;
            line-height: 1.5;
        }
        #btn-login {
            width: 100%;
            padding: 13px;
            border: none;
            border-radius: 14px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            background: linear-gradient(135deg, #a855f7, #6366f1);
            color: #fff;
            letter-spacing: 0.3px;
            box-shadow: 0 4px 20px rgba(168, 85, 247, 0.4);
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin: 0;
        }
        #btn-login:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 28px rgba(168, 85, 247, 0.55);
        }
        #btn-login:active { transform: translateY(0); }
        .google-icon {
            width: 20px; height: 20px;
            background: #fff;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 13px;
            flex-shrink: 0;
        }

        /* ── Разделитель ── */
        .divider {
            height: 1px;
            background: rgba(255,255,255,0.07);
            margin: 20px 0 18px;
        }

        /* ── Статус синхронизации ── */
        #sync-status {
            font-size: 11px;
            color: rgba(255,255,255,0.25);
            text-align: right;
            margin-bottom: 10px;
            height: 14px;
            transition: color 0.3s;
        }
        #sync-status.saving { color: rgba(168, 85, 247, 0.7); }
        #sync-status.saved  { color: rgba(99, 241, 166, 0.6); }

        .hidden { display: none; }

        /* ── Анимации символов ── */
        @keyframes anim-fade {
            from { opacity: 0; }
            to   { opacity: 1; }
        }
        @keyframes anim-slide-up {
            from { opacity: 0; transform: translateY(6px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes anim-scale {
            from { opacity: 0; transform: scale(0.2); }
            to   { opacity: 1; transform: scale(1); }
        }
        @keyframes anim-glow {
            0%   { opacity: 0; color: #c084fc; text-shadow: 0 0 10px #a855f7, 0 0 25px #a855f7; }
            50%  { opacity: 1; color: #e0aaff; text-shadow: 0 0 6px #a855f7; }
            100% { opacity: 1; color: rgba(255,255,255,0.92); text-shadow: none; }
        }
        @keyframes anim-bounce {
            0%   { opacity: 0; transform: translateY(-10px); }
            55%  { opacity: 1; transform: translateY(3px); }
            75%  { transform: translateY(-2px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        @keyframes anim-typewriter {
            0%,49% { opacity: 1; color: #c084fc; text-shadow: 0 0 6px #a855f7; }
            50%,99%{ opacity: 0; }
            100%   { opacity: 1; color: rgba(255,255,255,0.92); text-shadow: none; }
        }

        .char {
            display: inline-block;
            white-space: pre;
            vertical-align: baseline;
        }
        .char-newline {
            display: block;
            height: 0;
            white-space: pre;
        }
        .anim-fade       { animation: anim-fade       0.25s ease forwards; }
        .anim-slide-up   { animation: anim-slide-up   0.28s ease forwards; }
        .anim-scale      { animation: anim-scale       0.22s cubic-bezier(.34,1.56,.64,1) forwards; }
        .anim-glow       { animation: anim-glow        0.5s  ease forwards; }
        .anim-bounce     { animation: anim-bounce      0.35s ease forwards; }
        .anim-typewriter { animation: anim-typewriter  0.45s steps(1) forwards; }
    </style>
</head>
<body>
<div class="container">

    <!-- Авторизация -->
    <div id="auth-screen">
        <div style="font-size:48px; margin-bottom:16px;">📝</div>
        <h2>Облачный Блокнот</h2>
        <p>Войдите через Google чтобы синхронизировать текст между устройствами</p>
        <button id="btn-login">
            <span class="google-icon">G</span>
            Войти через Google
        </button>
    </div>

    <!-- Приложение -->
    <div id="app-screen" class="hidden">
        <div class="header">
            <div class="logo">
                <div class="logo-icon">📝</div>
                <span class="logo-text">Облачный Блокнот</span>
            </div>
            <div style="display:flex; align-items:center; gap:6px; min-width:0;">
                <span id="user-info"></span>
                <button id="btn-logout" title="Выйти">⇥</button>
            </div>
        </div>

        <div class="divider"></div>

        <div id="anim-picker">
            <button class="anim-btn active" data-anim="anim-fade">Fade</button>
            <button class="anim-btn" data-anim="anim-slide-up">Slide Up</button>
            <button class="anim-btn" data-anim="anim-scale">Scale</button>
            <button class="anim-btn" data-anim="anim-glow">Glow</button>
            <button class="anim-btn" data-anim="anim-bounce">Bounce</button>
            <button class="anim-btn" data-anim="anim-typewriter">Typewriter</button>
        </div>

        <div id="text-input" contenteditable="true" spellcheck="false"></div>

        <div id="sync-status">—</div>

        <div class="btn-row">
            <button class="btn-action" id="btn-copy">Копировать всё</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged }
        from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getDatabase, ref, set, onValue }
        from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyC6JayNN_rZcn8o9scI5gBEVKO6xXhQLV4",
        authDomain: "text-transmission-7aa49.firebaseapp.com",
        databaseURL: "https://text-transmission-7aa49-default-rtdb.firebaseio.com",
        projectId: "text-transmission-7aa49",
        storageBucket: "text-transmission-7aa49.firebasestorage.app",
        messagingSenderId: "749005357603",
        appId: "1:749005357603:web:a3d567ce1b91350336a796"
    };

    const app      = initializeApp(firebaseConfig);
    const auth     = getAuth(app);
    const db       = getDatabase(app);
    const provider = new GoogleAuthProvider();

    const authScreen    = document.getElementById('auth-screen');
    const appScreen     = document.getElementById('app-screen');
    const btnLogin      = document.getElementById('btn-login');
    const btnLogout     = document.getElementById('btn-logout');
    const btnCopy       = document.getElementById('btn-copy');
    const textInput     = document.getElementById('text-input');
    const userInfo      = document.getElementById('user-info');
    const animPicker    = document.getElementById('anim-picker');
    const syncStatus    = document.getElementById('sync-status');

    let currentUser    = null;
    let isTyping       = false;
    let typingTimeout  = null;
    let lastText       = '';
    let isRemoteUpdate = false;
    let currentAnim    = 'anim-fade';
    let syncTimeout    = null;

    // ── Выбор анимации ────────────────────────────────────────────────────────
    animPicker.addEventListener('click', (e) => {
        const btn = e.target.closest('.anim-btn');
        if (!btn) return;
        document.querySelectorAll('.anim-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentAnim = btn.dataset.anim;
    });

    // ── Статус ────────────────────────────────────────────────────────────────
    function setStatus(text, cls) {
        syncStatus.textContent = text;
        syncStatus.className = cls || '';
        clearTimeout(syncTimeout);
        if (cls === 'saved') {
            syncTimeout = setTimeout(() => {
                syncStatus.textContent = '—';
                syncStatus.className = '';
            }, 2000);
        }
    }

    // ── Утилиты ───────────────────────────────────────────────────────────────
    function getPlainText() {
        return textInput.innerText.replace(/\u00a0/g, ' ').replace(/\n$/, '');
    }

    function loadTextSilently(text) {
        isRemoteUpdate = true;
        textInput.innerHTML = '';
        if (text) {
            const s = document.createElement('span');
            s.style.whiteSpace = 'pre-wrap';
            s.textContent = text;
            textInput.appendChild(s);
        }
        lastText = text;
        isRemoteUpdate = false;
    }

    function makeAnimSpan(ch) {
        const s = document.createElement('span');
        if (ch === '\n') {
            s.className = 'char-newline';
            s.textContent = '\n';
        } else {
            s.className = `char ${currentAnim}`;
            s.textContent = ch;
        }
        return s;
    }

    function applyDiff(newText, animate) {
        let start = 0;
        while (start < lastText.length && start < newText.length && lastText[start] === newText[start]) start++;
        let oldEnd = lastText.length, newEnd = newText.length;
        while (oldEnd > start && newEnd > start && lastText[oldEnd-1] === newText[newEnd-1]) { oldEnd--; newEnd--; }

        const inserted     = newText.slice(start, newEnd);
        const deletedCount = oldEnd - start;
        if (deletedCount === 0 && inserted.length === 0) return;

        const prefix = newText.slice(0, start);
        const suffix = newText.slice(newEnd);

        textInput.innerHTML = '';

        if (prefix) {
            const s = document.createElement('span');
            s.style.whiteSpace = 'pre-wrap';
            s.textContent = prefix;
            textInput.appendChild(s);
        }

        if (animate) {
            for (const ch of inserted) textInput.appendChild(makeAnimSpan(ch));
        } else {
            if (inserted) {
                const s = document.createElement('span');
                s.style.whiteSpace = 'pre-wrap';
                s.textContent = inserted;
                textInput.appendChild(s);
            }
        }

        if (suffix) {
            const s = document.createElement('span');
            s.style.whiteSpace = 'pre-wrap';
            s.textContent = suffix;
            textInput.appendChild(s);
        }

        lastText = newText;
        const caretPos = start + inserted.length;
        setTimeout(() => restoreCaret(caretPos), 0);
    }

    function restoreCaret(pos) {
        const sel = window.getSelection();
        if (!sel) return;
        const range = document.createRange();
        let chars = 0, found = false;
        function walk(node) {
            if (found) return;
            if (node.nodeType === Node.TEXT_NODE) {
                const len = node.textContent.length;
                if (chars + len >= pos) { range.setStart(node, pos - chars); range.collapse(true); found = true; }
                else chars += len;
            } else { for (const c of node.childNodes) walk(c); }
        }
        walk(textInput);
        if (!found) { range.selectNodeContents(textInput); range.collapse(false); }
        sel.removeAllRanges();
        sel.addRange(range);
    }

    function getCaretPosition() {
        const sel = window.getSelection();
        if (!sel || !sel.rangeCount) return lastText.length;
        const range = sel.getRangeAt(0);
        const pre = range.cloneRange();
        pre.selectNodeContents(textInput);
        pre.setEnd(range.endContainer, range.endOffset);
        return pre.toString().length;
    }

    function saveText(text) {
        if (!currentUser) return;
        isTyping = true;
        setStatus('Сохранение...', 'saving');
        set(ref(db, 'users/' + currentUser.uid + '/text'), text)
            .then(() => setStatus('Сохранено ✓', 'saved'))
            .catch(e => { console.error(e); setStatus('Ошибка', ''); });
        clearTimeout(typingTimeout);
        typingTimeout = setTimeout(() => { isTyping = false; }, 1000);
    }

    // ── Auth ──────────────────────────────────────────────────────────────────
    onAuthStateChanged(auth, (user) => {
        if (user) {
            currentUser = user;
            userInfo.textContent = user.email;
            authScreen.classList.add('hidden');
            appScreen.classList.remove('hidden');
            const textRef = ref(db, 'users/' + user.uid + '/text');
            onValue(textRef, (snapshot) => {
                const data = snapshot.val() ?? '';
                if (!isTyping) loadTextSilently(data);
            });
        } else {
            currentUser = null;
            authScreen.classList.remove('hidden');
            appScreen.classList.add('hidden');
            textInput.innerHTML = '';
            lastText = '';
        }
    });

    // ── Ввод ──────────────────────────────────────────────────────────────────
    textInput.addEventListener('input', () => {
        if (isRemoteUpdate) return;
        const newText = getPlainText();
        if (newText === lastText) return;
        applyDiff(newText, true);
        saveText(newText);
    });

    textInput.addEventListener('paste', (e) => {
        e.preventDefault();
        const text = e.clipboardData.getData('text/plain');
        if (!text || !currentUser) return;
        const pos = getCaretPosition();
        const newText = lastText.slice(0, pos) + text + lastText.slice(pos);
        applyDiff(newText, false);
        saveText(newText);
    });

    // ── Кнопки ────────────────────────────────────────────────────────────────
    btnCopy.addEventListener('click', () => {
        navigator.clipboard.writeText(getPlainText()).then(() => {
            btnCopy.textContent = '✓ Скопировано';
            btnCopy.classList.add('copied');
            setTimeout(() => {
                btnCopy.textContent = 'Копировать всё';
                btnCopy.classList.remove('copied');
            }, 1500);
        }).catch(e => console.error(e));
    });

    btnLogin.addEventListener('click', () => {
        signInWithPopup(auth, provider).catch(e => console.error(e));
    });
    btnLogout.addEventListener('click', () => {
        signOut(auth).catch(e => console.error(e));
    });
</script>
</body>
    </html>
