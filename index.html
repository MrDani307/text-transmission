<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Облачный Блокнот</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            background-color: #1e1e1e;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 500px;
            text-align: center;
            position: relative;
        }


        #text-input {
            width: 100%;
            height: 150px;
            min-height: 60px;
            max-height: 600px;
            resize: vertical;
            background-color: #2d2d2d;
            color: #ffffff;
            border: 1px solid #444;
            border-radius: 4px;
            padding: 10px;
            margin-bottom: 10px;
            outline: none;
            text-align: left;
            overflow-y: auto;
            overflow-x: hidden;
            white-space: pre-wrap;
            word-break: break-word;
            line-height: 1.6;
            caret-color: #4caf50;
            font-size: 14px;
            font-family: Arial, sans-serif;
        }
        #text-input:empty::before {
            content: "Введите текст здесь...";
            color: #666;
            pointer-events: none;
        }


        /* ── Анимации ── */
        @keyframes anim-fade {
            from { opacity: 0; }
            to   { opacity: 1; }
        }
        @keyframes anim-slide-up {
            from { opacity: 0; transform: translateY(6px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes anim-scale {
            from { opacity: 0; transform: scale(0.2); }
            to   { opacity: 1; transform: scale(1); }
        }
        @keyframes anim-glow {
            0%   { opacity: 0; color: #4caf50; text-shadow: 0 0 10px #4caf50, 0 0 25px #4caf50; }
            50%  { opacity: 1; color: #a5ffac; text-shadow: 0 0 6px #4caf50; }
            100% { opacity: 1; color: #ffffff;  text-shadow: none; }
        }
        @keyframes anim-bounce {
            0%   { opacity: 0; transform: translateY(-10px); }
            55%  { opacity: 1; transform: translateY(3px); }
            75%  { transform: translateY(-2px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        @keyframes anim-typewriter {
            0%,49% { opacity: 1; color: #4caf50; text-shadow: 0 0 6px #4caf50; }
            50%,99%{ opacity: 0; }
            100%   { opacity: 1; color: #ffffff; text-shadow: none; }
        }


        /* inline-block чтобы transform работал */
        .char {
            display: inline-block;
            white-space: pre;          /* пробелы и \n не схлопываются */
            vertical-align: baseline;
        }
        /* перенос строки — block чтобы занимал всю ширину */
        .char-newline {
            display: block;
            height: 0;
            white-space: pre;
        }


        .anim-fade       { animation: anim-fade       0.25s ease forwards; }
        .anim-slide-up   { animation: anim-slide-up   0.28s ease forwards; }
        .anim-scale      { animation: anim-scale       0.22s cubic-bezier(.34,1.56,.64,1) forwards; }
        .anim-glow       { animation: anim-glow        0.5s  ease forwards; }
        .anim-bounce     { animation: anim-bounce      0.35s ease forwards; }
        .anim-typewriter { animation: anim-typewriter  0.45s steps(1) forwards; }


        /* ── Пикер анимации ── */
        #anim-picker {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 12px;
        }
        .anim-btn {
            background-color: #2d2d2d;
            color: #aaa;
            border: 1px solid #444;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
            width: auto;
            margin: 0;
        }
        .anim-btn:hover  { border-color: #4caf50; color: #fff; }
        .anim-btn.active { background-color: #4caf50; border-color: #4caf50; color: #fff; }


        button {
            background-color: #4caf50;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
            margin-bottom: 10px;
        }
        button.login  { background-color: #4285f4; }
        button.copy   { background-color: #00bcd4; }
        button.logout-icon {
            background: none;
            border: none;
            color: #f44336;
            font-size: 20px;
            cursor: pointer;
            width: auto;
            padding: 5px;
            margin: 0;
            position: absolute;
            top: 15px;
            right: 15px;
            line-height: 1;
        }
        .hidden { display: none; }
        #user-info {
            margin-bottom: 15px;
            font-size: 14px;
            color: #aaa;
            display: flex;
            align-items: center;
            padding-right: 30px;
            min-height: 24px;
        }
    </style>
</head>
<body>
<div class="container">
    <div id="auth-screen">
        <h2>Авторизация</h2>
        <p>Войдите через Google для синхронизации текста</p>
        <button class="login" id="btn-login">Войти через Google</button>
    </div>


    <div id="app-screen" class="hidden">
        <button class="logout-icon" id="btn-logout" title="Выйти">&#10143;</button>
        <div id="user-info">
            <span>Вы вошли как: <span id="user-email"></span></span>
        </div>


        <div id="anim-picker">
            <button class="anim-btn active" data-anim="anim-fade">Fade</button>
            <button class="anim-btn" data-anim="anim-slide-up">Slide Up</button>
            <button class="anim-btn" data-anim="anim-scale">Scale</button>
            <button class="anim-btn" data-anim="anim-glow">Glow</button>
            <button class="anim-btn" data-anim="anim-bounce">Bounce</button>
            <button class="anim-btn" data-anim="anim-typewriter">Typewriter</button>
        </div>


        <div id="text-input" contenteditable="true" spellcheck="false"></div>
        <button class="copy" id="btn-copy">Копировать всё</button>
    </div>
</div>


<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged }
        from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getDatabase, ref, set, onValue }
        from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";


    const firebaseConfig = {
        apiKey: "AIzaSyC6JayNN_rZcn8o9scI5gBEVKO6xXhQLV4",
        authDomain: "text-transmission-7aa49.firebaseapp.com",
        databaseURL: "https://text-transmission-7aa49-default-rtdb.firebaseio.com",
        projectId: "text-transmission-7aa49",
        storageBucket: "text-transmission-7aa49.firebasestorage.app",
        messagingSenderId: "749005357603",
        appId: "1:749005357603:web:a3d567ce1b91350336a796"
    };


    const app      = initializeApp(firebaseConfig);
    const auth     = getAuth(app);
    const db       = getDatabase(app);
    const provider = new GoogleAuthProvider();


    const authScreen    = document.getElementById('auth-screen');
    const appScreen     = document.getElementById('app-screen');
    const btnLogin      = document.getElementById('btn-login');
    const btnLogout     = document.getElementById('btn-logout');
    const btnCopy       = document.getElementById('btn-copy');
    const textInput     = document.getElementById('text-input');
    const userEmailHtml = document.getElementById('user-email');
    const animPicker    = document.getElementById('anim-picker');


    let currentUser    = null;
    let isTyping       = false;
    let typingTimeout  = null;
    let lastText       = '';
    let isRemoteUpdate = false;
    let currentAnim    = 'anim-fade';
    let isPaste        = false;   // флаг: текущее изменение — вставка


    // ── Выбор анимации ────────────────────────────────────────────────────────
    animPicker.addEventListener('click', (e) => {
        const btn = e.target.closest('.anim-btn');
        if (!btn) return;
        document.querySelectorAll('.anim-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentAnim = btn.dataset.anim;
    });


    // ── Утилиты ───────────────────────────────────────────────────────────────
    function getPlainText() {
        return textInput.innerText.replace(/\u00a0/g, ' ').replace(/\n$/, '');
    }


    function loadTextSilently(text) {
        isRemoteUpdate = true;
        textInput.innerHTML = '';
        if (text) {
            const s = document.createElement('span');
            s.style.whiteSpace = 'pre-wrap';
            s.textContent = text;
            textInput.appendChild(s);
        }
        lastText = text;
        isRemoteUpdate = false;
    }


    // Создать span для одного символа с анимацией
    function makeAnimSpan(ch) {
        const s = document.createElement('span');
        // Перенос строки — особый случай
        if (ch === '\n') {
            s.className = 'char-newline';
            s.textContent = '\n';
        } else {
            s.className = `char ${currentAnim}`;
            s.textContent = ch;
        }
        return s;
    }


    function applyDiff(newText, animate) {
        // Общий префикс
        let start = 0;
        while (start < lastText.length && start < newText.length && lastText[start] === newText[start]) {
            start++;
        }
        // Общий суффикс
        let oldEnd = lastText.length;
        let newEnd = newText.length;
        while (oldEnd > start && newEnd > start && lastText[oldEnd - 1] === newText[newEnd - 1]) {
            oldEnd--;
            newEnd--;
        }


        const inserted     = newText.slice(start, newEnd);
        const deletedCount = oldEnd - start;
        if (deletedCount === 0 && inserted.length === 0) return;


        const prefix = newText.slice(0, start);
        const suffix = newText.slice(newEnd);


        textInput.innerHTML = '';


        if (prefix) {
            const s = document.createElement('span');
            s.style.whiteSpace = 'pre-wrap';
            s.textContent = prefix;
            textInput.appendChild(s);
        }


        if (animate) {
            // Каждый символ — отдельный анимированный span
            for (const ch of inserted) {
                textInput.appendChild(makeAnimSpan(ch));
            }
        } else {
            // Вставка — один span без анимации
            if (inserted) {
                const s = document.createElement('span');
                s.style.whiteSpace = 'pre-wrap';
                s.textContent = inserted;
                textInput.appendChild(s);
            }
        }


        if (suffix) {
            const s = document.createElement('span');
            s.style.whiteSpace = 'pre-wrap';
            s.textContent = suffix;
            textInput.appendChild(s);
        }


        lastText = newText;
        const caretPos = start + inserted.length;
        setTimeout(() => restoreCaret(caretPos), 0);
    }


    function restoreCaret(pos) {
        const sel = window.getSelection();
        if (!sel) return;
        const range = document.createRange();
        let chars = 0;
        let found = false;


        function walk(node) {
            if (found) return;
            if (node.nodeType === Node.TEXT_NODE) {
                const len = node.textContent.length;
                if (chars + len >= pos) {
                    range.setStart(node, pos - chars);
                    range.collapse(true);
                    found = true;
                } else {
                    chars += len;
                }
            } else {
                for (const child of node.childNodes) walk(child);
            }
        }


        walk(textInput);
        if (!found) {
            range.selectNodeContents(textInput);
            range.collapse(false);
        }
        sel.removeAllRanges();
        sel.addRange(range);
    }


    function getCaretPosition() {
        const sel = window.getSelection();
        if (!sel || !sel.rangeCount) return lastText.length;
        const range = sel.getRangeAt(0);
        const pre = range.cloneRange();
        pre.selectNodeContents(textInput);
        pre.setEnd(range.endContainer, range.endOffset);
        return pre.toString().length;
    }


    function saveText(text) {
        if (!currentUser) return;
        isTyping = true;
        set(ref(db, 'users/' + currentUser.uid + '/text'), text)
            .catch(e => console.error("Ошибка сохранения:", e));
        clearTimeout(typingTimeout);
        typingTimeout = setTimeout(() => { isTyping = false; }, 1000);
    }


    // ── Auth ──────────────────────────────────────────────────────────────────
    onAuthStateChanged(auth, (user) => {
        if (user) {
            currentUser = user;
            userEmailHtml.textContent = user.email;
            authScreen.classList.add('hidden');
            appScreen.classList.remove('hidden');


            const textRef = ref(db, 'users/' + user.uid + '/text');
            onValue(textRef, (snapshot) => {
                const data = snapshot.val() ?? '';
                if (!isTyping) loadTextSilently(data);
            });
        } else {
            currentUser = null;
            authScreen.classList.remove('hidden');
            appScreen.classList.add('hidden');
            textInput.innerHTML = '';
            lastText = '';
        }
    });


    // ── Ввод ──────────────────────────────────────────────────────────────────
    textInput.addEventListener('input', () => {
        if (isRemoteUpdate) return;
        const newText = getPlainText();
        if (newText === lastText) return;


        // animate=false если это была вставка
        const animate = !isPaste;
        isPaste = false;


        applyDiff(newText, animate);
        saveText(newText);
    });


    textInput.addEventListener('paste', (e) => {
        e.preventDefault();
        const text = e.clipboardData.getData('text/plain');
        if (!text || !currentUser) return;
        const pos = getCaretPosition();
        const newText = lastText.slice(0, pos) + text + lastText.slice(pos);
        applyDiff(newText, false);   // вставка — без анимации
        saveText(newText);
    });


    // ── Кнопки ────────────────────────────────────────────────────────────────
    btnCopy.addEventListener('click', () => {
        navigator.clipboard.writeText(getPlainText()).then(() => {
            const orig = btnCopy.textContent;
            btnCopy.textContent = "Скопировано!";
            btnCopy.style.backgroundColor = "#4caf50";
            setTimeout(() => {
                btnCopy.textContent = orig;
                btnCopy.style.backgroundColor = "#00bcd4";
            }, 1500);
        }).catch(e => console.error("Ошибка копирования:", e));
    });


    btnLogin.addEventListener('click', () => {
        signInWithPopup(auth, provider)
            .catch(e => console.error("Ошибка авторизации:", e));
    });


    btnLogout.addEventListener('click', () => {
        signOut(auth)
            .catch(e => console.error("Ошибка выхода:", e));
    });
</script>
</body>
</html>
