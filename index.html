<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Облачный Блокнот</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #1e1e1e;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
            width: 90%;
            max-width: 500px;
            text-align: center;
        }
        textarea {
            width: 100%;
            height: 150px;
            background-color: #2d2d2d;
            color: #ffffff;
            border: 1px solid #444;
            border-radius: 4px;
            padding: 10px;
            box-sizing: border-box;
            resize: none;
            margin-bottom: 15px;
        }
        button {
            background-color: #4caf50;
            color: white;
            border: none;
            padding: 10px 20px;
            text-align: center;
            text-decoration: none;
            display: inline-block;
            font-size: 16px;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
            margin-bottom: 10px;
        }
        button.logout {
            background-color: #f44336;
        }
        button.login {
            background-color: #4285f4;
        }
        .hidden {
            display: none;
        }
        #user-info {
            margin-bottom: 15px;
            font-size: 14px;
            color: #aaa;
        }
    </style>
</head>
<body>

<div class="container">
    <div id="auth-screen">
        <h2>Авторизация</h2>
        <p>Войдите через Google для синхронизации текста</p>
        <button class="login" id="btn-login">Войти через Google</button>
    </div>

    <div id="app-screen" class="hidden">
        <div id="user-info">Вы вошли как: <span id="user-email"></span></div>
        <textarea id="text-input" placeholder="Введите текст здесь..."></textarea>
        <button id="btn-save">Сохранить в облако</button>
        <button class="logout" id="btn-logout">Выйти</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithRedirect, getRedirectResult, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyC6JayNN_rZcn8o9scI5gBEVKO6xXhQLV4",
        authDomain: "text-transmission-7aa49.firebaseapp.com",
        databaseURL: "https://text-transmission-7aa49-default-rtdb.firebaseio.com",
        projectId: "text-transmission-7aa49",
        storageBucket: "text-transmission-7aa49.firebasestorage.app",
        messagingSenderId: "749005357603",
        appId: "1:749005357603:web:a3d567ce1b91350336a796"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);
    const provider = new GoogleAuthProvider();

    const authScreen = document.getElementById('auth-screen');
    const appScreen = document.getElementById('app-screen');
    const btnLogin = document.getElementById('btn-login');
    const btnLogout = document.getElementById('btn-logout');
    const btnSave = document.getElementById('btn-save');
    const textInput = document.getElementById('text-input');
    const userEmailHtml = document.getElementById('user-email');

    let currentUser = null;

    getRedirectResult(auth).catch((error) => {
        console.error("Ошибка при возврате из Google:", error);
    });

    onAuthStateChanged(auth, (user) => {
        if (user) {
            currentUser = user;
            userEmailHtml.textContent = user.email;
            authScreen.classList.add('hidden');
            appScreen.classList.remove('hidden');
            
            const textRef = ref(db, 'users/' + user.uid + '/text');
            onValue(textRef, (snapshot) => {
                const data = snapshot.val();
                if (data !== null) {
                    textInput.value = data;
                }
            });
        } else {
            currentUser = null;
            authScreen.classList.remove('hidden');
            appScreen.classList.add('hidden');
            textInput.value = '';
        }
    });

    btnLogin.addEventListener('click', () => {
        signInWithRedirect(auth, provider).catch((error) => {
            console.error("Ошибка авторизации:", error);
        });
    });

    btnLogout.addEventListener('click', () => {
        signOut(auth).catch((error) => {
            console.error("Ошибка выхода:", error);
        });
    });

    btnSave.addEventListener('click', () => {
        if (currentUser) {
            set(ref(db, 'users/' + currentUser.uid + '/text'), textInput.value)
                .then(() => alert('Сохранено!'))
                .catch((error) => console.error("Ошибка保存ния:", error));
        }
    });
</script>

</body>
</html>
